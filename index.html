<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nooma — Never forget your meds again</title>
<link rel="icon" type="image/svg+xml" href="/favicon.svg">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,500;0,9..144,600;1,9..144,400;1,9..144,500;1,9..144,600&family=Instrument+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --ink: #2A1F1F;
  --cream: #FAF4ED;
  --red: #C9453B;
  --muted: #6B5757;
}

*, *::before, *::after {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
}

html, body {
  height: 100%;
  width: 100%;
  overflow: hidden;
}

body {
  font-family: 'Instrument Sans', -apple-system, BlinkMacSystemFont, sans-serif;
  color: var(--ink);
  -webkit-font-smoothing: antialiased;
  background: linear-gradient(135deg, #FAF4ED 0%, #F5EBDC 50%, #EDE4D4 100%);
}

/* Main layout */
.page {
  height: 100vh;
  height: 100dvh;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: clamp(1.5rem, 4vw, 3rem);
  text-align: center;
  position: relative;
}

/* Logo */
.logo {
  display: inline-flex;
  align-items: center;
  gap: 0.5rem;
  text-decoration: none;
  margin-bottom: clamp(1.5rem, 4vh, 2.5rem);
}

.logo-mark {
  width: clamp(36px, 4vw, 48px);
  height: auto;
}

.logo-word {
  font-family: 'Fraunces', Georgia, serif;
  font-size: clamp(1.6rem, 2.5vw, 2.2rem);
  font-weight: 500;
  color: var(--ink);
  letter-spacing: -0.02em;
}

/* Character */
.character-container {
  position: relative;
  width: clamp(180px, 30vh, 280px);
  height: clamp(180px, 30vh, 280px);
  margin-bottom: clamp(1.5rem, 4vh, 2.5rem);
}

.hero-char-svg {
  width: 100%;
  height: auto;
  filter: drop-shadow(0 16px 32px rgba(42, 31, 31, 0.1));
}

/* Sparkles */
.spark {
  position: absolute;
  font-family: 'Fraunces', serif;
  font-style: italic;
  color: #D8A845;
  animation: sparkle 3.6s ease-in-out infinite;
  pointer-events: none;
}

@keyframes sparkle {
  0%, 100% { opacity: 0.4; transform: scale(0.85) rotate(0deg); }
  50% { opacity: 1; transform: scale(1.15) rotate(12deg); }
}

/* Typography */
h1 {
  font-family: 'Fraunces', Georgia, serif;
  font-weight: 500;
  font-size: clamp(2rem, 5vw, 3.5rem);
  line-height: 1.1;
  letter-spacing: -0.02em;
  margin-bottom: clamp(0.75rem, 2vh, 1rem);
}

.tagline {
  font-family: 'Fraunces', Georgia, serif;
  font-style: italic;
  font-size: clamp(1rem, 1.8vw, 1.25rem);
  color: var(--muted);
  margin-bottom: clamp(2rem, 5vh, 3rem);
}

/* App store buttons */
.store-buttons {
  display: flex;
  gap: 1rem;
  flex-wrap: wrap;
  justify-content: center;
}

.store-btn {
  display: inline-flex;
  align-items: center;
  gap: 0.75rem;
  padding: 0.875rem 1.5rem;
  background: var(--ink);
  color: var(--cream);
  border-radius: 12px;
  text-decoration: none;
  transition: transform 0.2s, box-shadow 0.2s;
}

.store-btn:hover {
  transform: translateY(-2px);
  box-shadow: 0 8px 24px rgba(42, 31, 31, 0.2);
}

.store-btn svg {
  width: 24px;
  height: 24px;
  flex-shrink: 0;
}

.store-btn .label {
  text-align: left;
}

.store-btn .label-small {
  font-size: 0.65rem;
  font-weight: 500;
  letter-spacing: 0.04em;
  text-transform: uppercase;
  opacity: 0.8;
  line-height: 1;
  margin-bottom: 2px;
}

.store-btn .label-large {
  font-size: 1rem;
  font-weight: 600;
  letter-spacing: -0.01em;
  line-height: 1;
}

/* Footer */
.footer {
  position: absolute;
  bottom: clamp(1rem, 3vh, 2rem);
  left: 50%;
  transform: translateX(-50%);
  font-size: 0.8rem;
  color: var(--muted);
  text-align: center;
}

.footer a {
  color: var(--muted);
  text-decoration: none;
}

.footer a:hover {
  color: var(--red);
}

/* ============================================================
   CHARACTER ANIMATIONS
   ============================================================ */
@keyframes char-bob {
  0%, 100% { transform: translateY(0) scale(1); }
  50% { transform: translateY(-8px) scale(1.02); }
}
.char-bob { animation: char-bob 3.8s ease-in-out infinite; transform-origin: center; }

@keyframes char-sway {
  0%, 100% { transform: rotate(0deg); }
  25% { transform: rotate(-1.5deg); }
  75% { transform: rotate(1.5deg); }
}
.char-sway { animation: char-sway 5.2s ease-in-out infinite; transform-origin: center bottom; }

@keyframes char-blink-open {
  0%, 22%, 28%, 78%, 84%, 100% { opacity: 1; }
  24%, 26%, 80%, 82% { opacity: 0; }
}
@keyframes char-blink-closed {
  0%, 22%, 28%, 78%, 84%, 100% { opacity: 0; }
  24%, 26%, 80%, 82% { opacity: 1; }
}
.eyes-open { animation: char-blink-open 5.5s ease-in-out infinite; }
.eyes-closed { animation: char-blink-closed 5.5s ease-in-out infinite; opacity: 0; }

@keyframes char-look {
  0%, 100% { transform: translate(0, 0); }
  20% { transform: translate(-1.5px, 0.5px); }
  40% { transform: translate(1.5px, 0.5px); }
  60% { transform: translate(0, 1px); }
  80% { transform: translate(-1px, -0.5px); }
}
.char-pupils { animation: char-look 8s ease-in-out infinite; }
body.eye-tracking .char-pupils { animation: none; }

@keyframes char-tie-sway {
  0%, 100% { transform: rotate(0deg); }
  25% { transform: rotate(-2deg); }
  75% { transform: rotate(2deg); }
}
.char-tie { animation: char-tie-sway 4.4s ease-in-out infinite; transform-origin: 110px 152px; }

@keyframes char-cheek {
  0%, 100% { opacity: 0.7; }
  50% { opacity: 0.9; }
}
.char-cheek { animation: char-cheek 4s ease-in-out infinite; }

/* Responsive */
@media (max-height: 600px) {
  .character-container {
    width: 140px;
    height: 140px;
  }
  h1 {
    font-size: 1.75rem;
  }
}
</style>

<!-- EYE TRACKING -->
<script>
(function() {
  document.body.classList.add('eye-tracking');

  var heroChar = document.querySelector('.hero-char-svg');
  var pupilWraps = heroChar ? heroChar.querySelectorAll('.char-pupil-wrap') : [];
  var eyeCenters = { left: { cx: 80, cy: 100 }, right: { cx: 140, cy: 100 } };
  var MAX_OFFSET = 4;

  function updateEyes(e) {
    if (!heroChar) return;
    var rect = heroChar.getBoundingClientRect();
    var ptX = ((e.clientX - rect.left) / rect.width) * 220;
    var ptY = ((e.clientY - rect.top) / rect.height) * 220;

    pupilWraps.forEach(function(wrap) {
      var center = eyeCenters[wrap.getAttribute('data-eye')];
      var dx = ptX - center.cx;
      var dy = ptY - center.cy;
      var dist = Math.sqrt(dx*dx + dy*dy);
      if (dist > MAX_OFFSET) {
        dx = (dx / dist) * MAX_OFFSET;
        dy = (dy / dist) * MAX_OFFSET;
      }
      wrap.style.transform = 'translate(' + dx + 'px, ' + dy + 'px)';
    });
  }

  window.addEventListener('mousemove', updateEyes);
})();
</script>
